<!DOCTYPE html>
<html>
<head>
  <title>Hand Tracking 3D Cube</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    #info { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; pointer-events: none; }
    /* The small preview window */
    #video-container { position: absolute; bottom: 20px; right: 20px; width: 240px; height: 180px; border: 2px solid #444; border-radius: 8px; overflow: hidden; transform: scaleX(-1); }
    #input_video { display: none; }
    canvas.output_canvas { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="info">Move hand to rotate | Pinch fingers to scale</div>
  <video id="input_video"></video>
  <div id="video-container">
    <canvas id="debug_canvas" width="240" height="180"></canvas>
  </div>
  <div id="three-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // --- 1. Three.js Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-container').appendChild(renderer.domElement);

    // Add lighting (makes the cube look 3D instead of a flat shape)
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 2).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshPhongMaterial({ color: 0x00ffcc, shininess: 100 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);
    camera.position.z = 5;

    // --- 2. Hand Tracking Logic ---
    const videoElement = document.getElementById('input_video');
    const debugCanvas = document.getElementById('debug_canvas');
    const canvasCtx = debugCanvas.getContext('2d');

    function onResults(results) {
      // Draw video to the small debug window
      canvasCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
      canvasCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        
        // Use Index Finger Tip (Landmark 8) for rotation
        const index = hand[8];
        const thumb = hand[4];

        // Smoothly rotate cube based on hand position
        // Normalizing 0-1 to -3 to 3 radians
        cube.rotation.y = (index.x - 0.5) * 8; 
        cube.rotation.x = (index.y - 0.5) * 8;

        // "Pinch" Calculation: Distance between Thumb and Index
        const dx = index.x - thumb.x;
        const dy = index.y - thumb.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // If pinching (close distance), make cube smaller
        const targetScale = dist < 0.05 ? 0.5 : 1.2;
        cube.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
      }
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7, // Higher confidence to reduce "jitter"
      minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    // --- 3. Camera Start ---
    const cameraFeed = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 640, height: 480
    });
    cameraFeed.start();

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      renderer.render(scene, camera);
    }
    renderLoop();

    window.onresize = () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    };
  </script>
</body>
</html>
