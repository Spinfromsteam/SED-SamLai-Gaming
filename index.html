<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Hand Cube</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center;
            align-items: center; z-index: 100;
        }
        button { padding: 20px 40px; font-size: 1.2rem; border-radius: 50px; border: none; background: #00ffcc; cursor: pointer; }
        #video-preview { position: absolute; bottom: 10px; right: 10px; width: 120px; border: 1px solid #555; transform: scaleX(-1); border-radius: 8px; }
    </style>
</head>
<body>

    <div id="overlay"><button id="startBtn">TAP TO START WEBCAM</button></div>
    <video id="input_video" playsinline style="display:none;"></video>
    <canvas id="video-preview"></canvas>
    <div id="three-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const previewCanvas = document.getElementById('video-preview');
        const previewCtx = previewCanvas.getContext('2d');

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-container').appendChild(renderer.domElement);

        const cube = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshNormalMaterial());
        scene.add(cube);
        camera.position.z = 5;

        // 2. Hand Tracking Logic
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults((results) => {
            previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            previewCtx.drawImage(results.image, 0, 0, previewCanvas.width, previewCanvas.height);
            
            if (results.multiHandLandmarks?.length > 0) {
                const index = results.multiHandLandmarks[0][8];
                cube.rotation.y = (index.x - 0.5) * 10;
                cube.rotation.x = (index.y - 0.5) * 10;
            }
        });

        // 3. iPhone Camera Start
        startBtn.onclick = () => {
            overlay.style.display = 'none';
            // Request camera via MediaPipe Camera Utils
            const cameraHelper = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraHelper.start();
            animate();
        };

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
